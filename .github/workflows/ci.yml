name: CI

# Every push and every pull request targeting main/master — whichever the
# default branch ends up being called once this repo has a GitHub remote,
# both are listed so the workflow works regardless.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# A newer push to the same branch/PR cancels an in-flight run for the old
# one — no point spending runner minutes finishing a check for a commit
# that's already been superseded.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run ruff
        run: ruff check .

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      # Cache Playwright's downloaded browser binary — keyed on the
      # installed playwright version, so a dependency bump invalidates it
      # automatically instead of silently running a mismatched browser
      # build. Safe to restore unconditionally: `playwright install` below
      # always runs regardless of cache hit/miss, and Playwright's own
      # installer already no-ops when the exact build it needs is already
      # present at this path — this cache just makes that check fast
      # instead of re-downloading Chromium every run.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright's Chromium (+ OS dependencies)
        run: python -m playwright install --with-deps chromium

      - name: Run pytest with coverage
        run: |
          pytest \
            --cov=job_automation \
            --cov-report=xml \
            --cov-report=term-missing \
            --junitxml=pytest-report.xml

      # Uploaded even if the run above failed (`if: always()`) — a failing
      # run's report/coverage is exactly what you need to debug it from
      # the Actions UI without reproducing locally first.
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: pytest-report.xml
          retention-days: 30

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

  docker:
    name: Build & validate Docker image
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # `load: true` (not `push`) — this workflow only proves the image
      # builds and boots correctly; publishing to a registry is a
      # deliberately separate concern (see docs/CI_CD.md) this doesn't do,
      # matching Railway's/Render's own git-push-triggered builds, which
      # build directly from this same Dockerfile independently of GitHub
      # Actions rather than pulling a GHA-published image.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: uk-healthcare-job-automation:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Boots the exact image just built — no `.env`, no configured
      # DATABASE_URL/SMTP/Anthropic key — proving the app starts cleanly
      # on nothing but its own built-in defaults (SQLite, ENVIRONMENT=
      # development) the way docs/DEPLOYMENT.md promises it can.
      - name: Smoke test the image
        run: |
          docker run -d --name ci-smoke -p 8000:8000 uk-healthcare-job-automation:ci
          echo "Waiting for the container to report healthy..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8000/health; then
              echo "Container is healthy."
              exit 0
            fi
            sleep 2
          done
          echo "Container never became healthy — dumping logs:"
          docker logs ci-smoke
          exit 1

      - name: Dump container logs
        if: always()
        run: docker logs ci-smoke || true

      - name: Clean up
        if: always()
        run: docker rm -f ci-smoke || true
