# Local Docker Compose stack: the app + a real Postgres instance, so
# Postgres compatibility (see docs/DEPLOYMENT.md) can be exercised without
# a managed cloud database. Not what Railway/Render deploy from directly —
# those build straight from the Dockerfile and supply their own managed
# Postgres via DATABASE_URL — but the same Dockerfile either way.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: job_automation
      POSTGRES_PASSWORD: job_automation
      POSTGRES_DB: job_automation
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U job_automation"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://job_automation:job_automation@db:5432/job_automation
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
